spring:
  config:
    import: classpath:rate-limit.yaml
  mail:
    host: smtp.mailersend.net
    port: 587
    username: placeholder
    password: placeholder
    from: noreply@novaraspace.com
    properties:
      mail:
        smtp:
          debug: true
          auth: true
          starttls:
            enable: true
          timeout: 8000
  application:
    name: novara
  datasource:
    username: ${NOVARA_SQL_USER:root}
    url: ${NOVARA_DB_URL:jdbc:mysql://mysql:3306/novara-local?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true}
    driverClassName: com.mysql.cj.jdbc.Driver
    password: ${MYSQL_PASS1:1q2w3e4r}
  jpa:
    show-sql: false
    open-in-view: 'false'
    defer-datasource-initialization: false
    properties:
      hibernate:
        #        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: 'TRUE'
    #        generate_statistics: false
    hibernate:
      ddl-auto: validate
  servlet:
    multipart:
      max-request-size: 2MB
      max-file-size: 1MB
  flyway:
    baseline-version: 1
    baseline-on-migrate: true
app:
  jwt:
    issuer: "novara-space"
    secret: ${NOVARA_JWT_SECRET:this-is-not-a-real-secret-local-dev-only-12345}
    expiry-minutes: 20
    refresh-expiry-hours: 32
    refresh-cookie-path: /auth
  verification-token-expiry-hours: 24
  enable-email-verification: false
  enable-email-password-reset: false
  frontend-url: http://localhost:4200
  flight:
    padding-days-on-fetch: 14
    unbooked-cleanup-days-back: 10
    max-future-departure-days: 200
  booking:
    cleanup-months-back: 24
  user:
    max-activation-attempts: 4
    unverified-cleanup-days: 5
    reset-token-expiry-minutes: 30
    adminInitialPass: "parola"
    userInitialPass: "parola"

server:
  port: 8085

logging:
  level:
    org.hibernate.SQL: ERROR
    org.hibernate.stat: DEBUG
    org.hibernate.arm.jdbc.bind: ERROR
    org.springframework: WARN
    org.springframework.boot.actuate: ERROR
    #    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    org.springframework.security: ERROR
    org.springframework.mail: ERROR